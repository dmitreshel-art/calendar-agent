services:
  # ── Radicale: CalDAV storage ──────────────────────────────
  radicale:
    image: tomsquest/docker-radicale:3.5.6.0
    container_name: calendar-agent-radicale
    restart: unless-stopped
    ports:
      - "5232:5232"
    volumes:
      - ./data/radicale:/data
      - ./services/radicale:/config
      - ./data/radicale/users:/config/users
    environment:
      TAKE_FILE_OWNERSHIP: "true"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import http.client; c=http.client.HTTPConnection('127.0.0.1',5232,timeout=2); c.request('GET','/'); r=c.getresponse(); raise SystemExit(0 if r.status in (200,302,401,403) else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  # ── Calendar Agent: REST + MCP backend ────────────────────
  calendar-service:
    build:
      context: ./services/calendar-service
    container_name: calendar-agent-service
    restart: unless-stopped
    depends_on:
      radicale:
        condition: service_healthy
    ports:
      - "8090:8090"
    env_file:
      - .env
    volumes:
      - ./data/calendar_service:/app/data
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8090"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ── Hermes Agent: Matrix gateway + MCP client ─────────────
  hermes:
    build:
      context: ./services/hermes
    image: calendar-agent-hermes:latest
    container_name: hermes-agent
    restart: unless-stopped
    command: gateway run
    depends_on:
      calendar-service:
        condition: service_healthy
    volumes:
      - ./data/hermes:/opt/data
    environment:
      HERMES_UID: ${HERMES_UID:-10000}
      HERMES_GID: ${HERMES_GID:-10000}
      TZ: ${TZ:-Asia/Barnaul}
    # Matrix gateway connects outward to the homeserver.
    # No public HTTP port is required for the calendar bot.
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

networks:
  default:
    name: calendar-agent-net
