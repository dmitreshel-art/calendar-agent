services:
  radicale:
    image: tomsquest/docker-radicale:3.5.6.0
    container_name: calendar-agent-radicale
    restart: unless-stopped
    ports:
      - "5232:5232"
    volumes:
      - ./data/radicale:/data
      - ./services/radicale:/config
      - ./data/radicale/users:/config/users
    environment:
      TAKE_FILE_OWNERSHIP: "true"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import http.client; c=http.client.HTTPConnection('127.0.0.1',5232,timeout=2); c.request('GET','/'); r=c.getresponse(); raise SystemExit(0 if r.status in (200,302,401,403) else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  calendar-service:
    build:
      context: ./services/calendar-service
    container_name: calendar-agent-service
    restart: unless-stopped
    depends_on:
      radicale:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data/calendar_service:/app/data
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  calendar-mcp:
    build:
      context: ./services/calendar-service
    container_name: calendar-agent-mcp
    restart: unless-stopped
    depends_on:
      radicale:
        condition: service_healthy
    ports:
      - "8765:8765"
    env_file:
      - .env
    environment:
      MCP_TRANSPORT: "streamable-http"
      MCP_PORT: "8765"
      MCP_HOST: "0.0.0.0"
      CALDAV_BASE_URL: "http://radicale:5232"
    volumes:
      - ./data/calendar_service:/app/data
    command: ["python3", "-m", "app.mcp_server"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/mcp/"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s
