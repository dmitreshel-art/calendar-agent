services:
  radicale:
    image: tomsquest/docker-radicale:3.5.6.0
    container_name: calendar-agent-radicale
    restart: unless-stopped
    ports:
      - "5232:5232"
    volumes:
      - ./data/radicale:/data
      - ./services/radicale/config:/config/config:ro
      - ./services/radicale/rights:/config/rights:ro
      - ./data/radicale/users:/config/users
    environment:
      TAKE_FILE_OWNERSHIP: "false"

  calendar-service:
    build:
      context: ./services/calendar-service
    container_name: calendar-agent-service
    restart: unless-stopped
    depends_on:
      - radicale
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      - ./data/calendar_service:/app/data
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080"]
